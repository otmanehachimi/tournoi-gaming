<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gaming World Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#ffcc00,#ff8800);
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#111;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

input{
background:#1f2937;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.player{
display:flex;
justify-content:space-between;
padding:8px;
background:#1f2937;
margin:5px 0;
border-radius:6px;
}

.match{
padding:10px;
background:#374151;
margin:5px 0;
border-radius:8px;
text-align:center;
}

.chatBox{
height:180px;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
background:#1f2937;
color:white;
}
</style>
</head>

<body>

<header>
🎮 Gaming World Hub
</header>

<div class="container">

<!-- INSCRIPTION -->
<div class="card">
<h2>👤 Inscription</h2>

<input id="name" placeholder="Pseudo">

<select id="game">
<option value="Blox Fruits">Blox Fruits</option>
<option value="Brookhaven">Brookhaven</option>
<option value="Pet Simulator">Pet Simulator</option>
<option value="Adopt Me">Adopt Me</option>
</select>

<button onclick="join()">Rejoindre</button>
</div>

<!-- PLAYERS -->
<div class="card">
<h2>👥 Joueurs inscrits</h2>
<div id="players"></div>
</div>

<!-- MATCHS -->
<div class="card">
<h2>⚔️ Matchs</h2>
<div id="matches"></div>
</div>

<!-- CHAT -->
<div class="card">
<h2>💬 Chat mondial</h2>

<div id="chatBox" class="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 TON FIREBASE
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "gaming-world-e84dd.firebaseapp.com",
  databaseURL: "https://gaming-world-e84dd-default-rtdb.firebaseio.com/",
  projectId: "gaming-world-e84dd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const playersRef = ref(db,"players");
const chatRef = ref(db,"chat");

// 👤 INSCRIPTION
window.join = function(){
let name = document.getElementById("name").value;
let game = document.getElementById("game").value;

if(!name) return;

push(playersRef,{
name:name,
game:game,
score:0
});
}

// 👥 PLAYERS
onValue(playersRef,(snap)=>{
let data = snap.val();
let players = [];

let list = document.getElementById("players");
list.innerHTML = "";

for(let id in data){
players.push({id,...data[id]});

list.innerHTML += `
<div class="player">
👤 ${data[id].name}
🎮 ${data[id].game}
⭐ ${data[id].score}
</div>`;
}

generateMatches(players);
});

// ⚔️ MATCHS
function generateMatches(players){
let m = document.getElementById("matches");
m.innerHTML = "";

for(let i=0;i<players.length;i+=2){
if(players[i+1]){
m.innerHTML += `
<div class="match">
${players[i].name} ⚔️ ${players[i+1].name}
</div>`;
}
}
}

// 💬 CHAT
window.sendMsg = function(){
let msg = document.getElementById("msg").value;
if(!msg) return;

push(chatRef,{text:msg});
document.getElementById("msg").value="";
}

onChildAdded(chatRef,(snap)=>{
let v = snap.val();

document.getElementById("chatBox").innerHTML +=
`<div>💬 ${v.text}</div>`;
});

</script>

</body>
</html>
