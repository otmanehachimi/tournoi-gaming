<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tournoi Gaming World</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#2563eb,#7c3aed);
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

input{
background:#1f2937;
color:white;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.player{
display:flex;
justify-content:space-between;
padding:8px;
background:#1f2937;
margin:5px 0;
border-radius:6px;
}

.match{
padding:10px;
background:#374151;
margin:5px 0;
border-radius:8px;
text-align:center;
}

.chatBox{
height:180px;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
🏆 Tournoi Gaming World
</header>

<div class="container">

<!-- INSCRIPTION -->
<div class="card">
<h2>👤 Rejoindre</h2>
<input id="name" placeholder="Pseudo">
<button onclick="join()">Rejoindre</button>
</div>

<!-- PLAYERS -->
<div class="card">
<h2>👥 Joueurs</h2>
<div id="players"></div>
</div>

<!-- MATCHS -->
<div class="card">
<h2>⚔️ Matchs</h2>
<div id="matches"></div>
</div>

<!-- CHAT -->
<div class="card">
<h2>💬 Chat mondial</h2>

<div id="chatBox" class="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "gaming-world-e84dd.firebaseapp.com",
  databaseURL: "https://gaming-world-e84dd-default-rtdb.firebaseio.com/",
  projectId: "gaming-world-e84dd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const playersRef = ref(db,"players");
const chatRef = ref(db,"chat");

// 👤 JOIN
window.join = function(){
let name = document.getElementById("name").value;
if(!name) return;

push(playersRef,{
name:name,
score:0
});
}

// 👥 PLAYERS + MATCHS
onValue(playersRef,(snap)=>{
let data = snap.val();
let players = [];

let list = document.getElementById("players");
list.innerHTML = "";

for(let id in data){
players.push({id,...data[id]});

list.innerHTML += `
<div class="player">
👤 ${data[id].name}
⭐ ${data[id].score || 0}
</div>`;
}

generateMatches(players);
});

// ⚔️ MATCHS
function generateMatches(players){
let m = document.getElementById("matches");
m.innerHTML = "";

for(let i=0;i<players.length;i+=2){
if(players[i+1]){
m.innerHTML += `
<div class="match">
${players[i].name} ⚔️ ${players[i+1].name}
<br><br>

<button onclick="win('${players[i].id}')">
🏆 ${players[i].name}
</button>

<button onclick="win('${players[i+1].id}')">
🏆 ${players[i+1].name}
</button>

</div>
`;
}
}
}

// 🏆 SCORE FIX PROPRE (IMPORTANT)
window.win = function(id){
let playerRef = ref(db,"players/"+id);

runTransaction(playerRef,(player)=>{
if(player){
player.score = (player.score || 0) + 1;
}
return player;
});
}

// 💬 CHAT
window.sendMsg = function(){
let msg = document.getElementById("msg").value;
if(!msg) return;

push(chatRef,{text:msg});
document.getElementById("msg").value="";
}

onChildAdded(chatRef,(snap)=>{
let v = snap.val();

document.getElementById("chatBox").innerHTML +=
`<div>💬 ${v.text}</div>`;
});

</script>

</body>
</html>
